<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141414">
<title>TAKLIDY — The Tea Bridge</title>
<meta name="description" content="The Tea Bridge — TAKLIDY × Fortnum & Mason. Turn through the presentation page by page, in English or French.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,500;0,6..96,600;0,6..96,700;1,6..96,500&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Pinyon+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --wine:#141414; --wine-2:#3A3A3A; --gold:#333333; --gold-2:#DCDCDC;
    --gold-deep:#222222; --paper:#FFFFFF; --ink:#3A2A22; --muted:#8C7350; --line:#2A2A2A;
    --serif:"Cormorant Garamond",Georgia,serif;
    --display:"Bodoni Moda",Didot,"Times New Roman",serif;
    --script:"Pinyon Script",cursive;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;max-width:100%;overflow-x:hidden}
  body{ font-family:var(--serif); color:var(--gold-2);
    background:radial-gradient(circle at 50% 30%, #2A2A2A 0, #161616 72%) fixed;
    display:flex; flex-direction:column; overflow:hidden; }

  /* ---- top bar — mirrors book.html / films.html ---- */
  header.bar{ flex:0 0 auto; display:flex; align-items:center; flex-wrap:wrap; gap:10px 14px;
    padding:10px 18px; color:var(--gold-2); max-width:100%; }
  .bar .brand{ font-family:var(--display); letter-spacing:.34em; font-size:15px;
    color:var(--gold-2); text-indent:.34em; }
  .bar .spacer{ flex:1; }
  .bar nav.pages{ display:flex; flex-wrap:wrap; gap:6px; }
  .bar nav.pages a{ font-family:var(--display); font-size:11px; letter-spacing:.1em;
    text-transform:uppercase; color:var(--gold-2); text-decoration:none; padding:7px 12px;
    border:1px solid var(--gold-deep); border-radius:8px; transition:background .2s; }
  .bar nav.pages a:hover{ background:var(--wine); }
  .bar nav.pages a.on{ background:var(--wine); }
  .bar .lang{ display:flex; border:1px solid var(--gold-deep); border-radius:8px; overflow:hidden; }
  .bar .lang button{ background:transparent; color:var(--gold-2); border:0; padding:7px 13px;
    cursor:pointer; font-family:var(--display); font-size:12px; letter-spacing:.1em; }
  .bar .lang button.on{ background:var(--wine); }

  /* ---- stage ---- */
  #scene{ flex:1 1 auto; min-height:0; display:flex; align-items:center; justify-content:center;
    position:relative; perspective:2600px; transition:transform .5s cubic-bezier(.5,0,.2,1); }

  #book{ position:relative; transform-style:preserve-3d; }
  .page{ position:absolute; inset:0; transform-origin:left center; transform-style:preserve-3d;
    transition:transform 1s cubic-bezier(.33,.02,.18,1);
    border-radius:3px 7px 7px 3px; overflow:hidden;
    box-shadow:0 22px 55px rgba(0,0,0,.6), 0 0 0 1px rgba(201,162,75,.12); }
  .page img{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    background:var(--paper); backface-visibility:hidden; pointer-events:none;
    -webkit-user-drag:none; user-select:none; }
  .page::before{ content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(90deg, rgba(0,0,0,.14), transparent 11%); }
  .page.flipped{ transform:rotateY(-180deg); }

  /* click zones for turn */
  .zone{ position:absolute; top:0; bottom:0; width:32%; z-index:90; cursor:pointer; }
  .zone.l{ left:0; } .zone.r{ right:0; }

  /* ---- control footer — mirrors book.html ---- */
  footer.ctl{ flex:0 0 auto; display:flex; align-items:center; justify-content:center;
    gap:16px; padding:12px; color:var(--gold-2); }
  .ctl button.turn{ width:48px; height:48px; border-radius:50%; cursor:pointer;
    border:1px solid var(--gold-deep); background:#2E2E2E; color:var(--gold-2);
    font-size:20px; transition:background .2s,transform .15s; }
  .ctl button.turn:hover{ background:var(--wine); transform:scale(1.07); }
  .ctl button.turn:disabled{ opacity:.32; cursor:default; transform:none; }
  .ctl .count{ font-family:var(--display); letter-spacing:.16em; font-size:13px; min-width:80px;
    text-align:center; }
  .ctl button.tool{ width:40px; height:40px; border-radius:50%; cursor:pointer;
    border:1px solid var(--gold-deep); background:#2E2E2E; color:var(--gold-2);
    display:grid; place-items:center; transition:background .2s,transform .15s; }
  .ctl button.tool:hover{ background:var(--wine); transform:translateY(-1px); }
  .ctl button.tool svg{ width:18px; height:18px; fill:none; stroke:currentColor;
    stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }

  /* ---- rotated: scene turns, controls follow at the bottom ---- */
  body.rotated #scene{ transform:rotate(90deg); }

  /* ---- phones / narrow: keep the flipbook, just tighten the chrome ---- */
  @media (max-width:760px){
    .bar{ padding:8px 12px; gap:8px; }
    .bar .brand{ font-size:13px; }
    .bar nav.pages a{ padding:6px 8px; font-size:10px; }
    .ctl{ gap:12px; padding:10px; }
    .ctl button.turn{ width:44px; height:44px; }
  }
</style>
</head>
<body>
<header class="bar">
  <span class="brand">TAKLIDY</span>
  <span class="spacer"></span>
  <nav class="pages">
    <a href="index.html">Home</a>
    <a href="book.html">The&nbsp;Book</a>
    <a href="tea-bridge.html" class="on">Tea&nbsp;Bridge</a>
    <a href="films.html">Films</a>
  </nav>
  <div class="lang">
    <button data-l="en" class="on">EN</button><button data-l="fr">FR</button>
  </div>
</header>

<div id="scene"><div id="book">
  <div class="zone l" id="zoneL"></div>
  <div class="zone r" id="zoneR"></div>
</div></div>

<footer class="ctl">
  <button class="turn" id="prev" title="Previous">‹</button>
  <span class="count" id="count">1 / 8</span>
  <button class="turn" id="next" title="Next">›</button>
  <button class="tool" id="rotate" title="Rotate">
    <svg viewBox="0 0 24 24"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
  </button>
  <button class="tool" id="fs" title="Fullscreen">
    <svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/></svg>
  </button>
</footer>

<script>
(function(){
  var TOTAL=8, RATIO=842.25/595.5; // landscape A4 w/h
  var lang='en', current=0;
  var scene=document.getElementById('scene'),
      book=document.getElementById('book'),
      zoneL=document.getElementById('zoneL'),
      zoneR=document.getElementById('zoneR'),
      countEl=document.getElementById('count');

  function fit(){
    var rotated=document.body.classList.contains('rotated');
    var availW=rotated?scene.clientHeight:scene.clientWidth;
    var availH=rotated?scene.clientWidth:scene.clientHeight;
    var w=Math.min(availW-32, (availH-28)*RATIO);
    var h=w/RATIO;
    book.style.width=Math.floor(w)+'px';
    book.style.height=Math.floor(h)+'px';
  }

  function build(){
    book.querySelectorAll('.page').forEach(function(p){p.remove();});
    for(var i=1;i<=TOTAL;i++){
      var pg=document.createElement('div'); pg.className='page';
      var img=document.createElement('img');
      img.src='tea-bridge/'+lang+'/p-'+i+'.jpg'; img.alt='Page '+i;
      pg.appendChild(img); book.insertBefore(pg, zoneL);
    }
    if(current>TOTAL-1) current=TOTAL-1;
    render(); fit();
  }

  function render(){
    var pages=book.querySelectorAll('.page');
    pages.forEach(function(pg,i){
      var flipped=i<current;
      pg.classList.toggle('flipped', flipped);
      pg.style.zIndex=flipped?i:(TOTAL-i);
    });
    countEl.textContent=(current+1)+' / '+TOTAL;
    document.getElementById('prev').disabled=current===0;
    document.getElementById('next').disabled=current===TOTAL-1;
  }

  function next(){ if(current<TOTAL-1){ current++; render(); } }
  function prev(){ if(current>0){ current--; render(); } }

  document.getElementById('next').onclick=next;
  document.getElementById('prev').onclick=prev;
  zoneR.onclick=next; zoneL.onclick=prev;
  document.getElementById('rotate').onclick=function(){
    document.body.classList.toggle('rotated'); fit();
  };
  document.getElementById('fs').onclick=function(){
    if(!document.fullscreenElement){ (document.documentElement.requestFullscreen||function(){})(); }
    else if(document.exitFullscreen){ document.exitFullscreen(); }
  };
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight') next(); else if(e.key==='ArrowLeft') prev();
  });
  document.querySelectorAll('.lang button').forEach(function(b){
    b.onclick=function(){
      document.querySelectorAll('.lang button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on'); lang=b.dataset.l; build();
    };
  });

  // swipe
  var sx=0;
  book.addEventListener('touchstart',function(e){ sx=e.touches[0].clientX; },{passive:true});
  book.addEventListener('touchend',function(e){
    var dx=e.changedTouches[0].clientX-sx;
    if(Math.abs(dx)>40){ dx<0?next():prev(); }
  },{passive:true});

  var rt; addEventListener('resize',function(){ clearTimeout(rt); rt=setTimeout(fit,150); });
  build();
})();
</script>
</body>
</html>
